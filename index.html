<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zagazig blog - Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }
        .header {
            background: white;
            padding: 20px 40px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            color: #333;
        }
        .nav {
            display: flex;
            gap: 15px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary {
            background: #48bb78;
            color: white;
        }
        .btn-danger {
            background: #e53e3e;
            color: white;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .post {
            background: white;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .post h3 {
            color: #333;
            margin-bottom: 10px;
        }
        .post-meta {
            color: #666;
            font-size: 12px;
            margin-bottom: 15px;
        }
        .post-content {
            color: #555;
            line-height: 1.6;
        }
        .delete-btn {
            background: #e53e3e;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            margin-top: 15px;
            font-size: 12px;
        }
        .empty {
            text-align: center;
            color: #666;
            padding: 50px;
            background: white;
            border-radius: 8px;
        }
        .loading {
            text-align: center;
            padding: 50px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>zagazig blog</h1>
        <div class="nav">
            <a href="create.html" class="btn btn-primary">New Post</a>
            <button onclick="logout()" class="btn btn-danger">Logout</button>
        </div>
    </div>
    <div class="container" id="posts-container">
        <div class="loading">Loading posts...</div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000';

        function getToken() {
            return localStorage.getItem('token');
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        }

        async function loadPosts() {
            try {
                const response = await fetch(`${API_URL}/posts`);
                const posts = await response.json();
                
                const container = document.getElementById('posts-container');
                
                if (posts.length === 0) {
                    container.innerHTML = '<div class="empty">No posts yet. Create your first post!</div>';
                    return;
                }
                
                const token = getToken();
                
                container.innerHTML = posts.map(post => `
                    <div class="post">
                        <h3>${escapeHtml(post.title)}</h3>
                        <div class="post-meta">Posted on ${new Date(post.created_at).toLocaleDateString()}</div>
                        <div class="post-content">${escapeHtml(post.content)}</div>
                        ${token ? `<button onclick="deletePost(${post.id})" class="delete-btn">Delete Post</button>` : ''}
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('posts-container').innerHTML = '<div class="empty">Error loading posts</div>';
            }
        }

        async function deletePost(id) {
            const token = getToken();
            if (!token) {
                alert('Please login to delete posts');
                return;
            }
            
            if (!confirm('Are you sure you want to delete this post?')) return;
            
            try {
                const response = await fetch(`${API_URL}/posts/${id}`, {
                    method: 'DELETE',
                    headers: { 'token': token }
                });
                
                const data = await response.json();
                
                if (data.message) {
                    loadPosts();
                } else {
                    alert(data.error || 'Delete failed');
                }
            } catch (error) {
                alert('Error deleting post');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Check if logged in
        if (!getToken()) {
            window.location.href = 'login.html';
        } else {
            loadPosts();
        }
    </script>
</body>
</html>
